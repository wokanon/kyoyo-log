<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>教養ログ</title>
<!-- ホーム画面アプリ化（iOSのデータ消去を受けにくくする） -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="教養ログ">
<meta name="theme-color" content="#7a6a4f">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<script>
  // 描画前にテーマを当てて、明→暗のチラつきを防ぐ
  (function(){ try{
    var t = JSON.parse(localStorage.getItem("kyoyo_theme"));
    if(t!=="dark" && t!=="light"){ t = (window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light"; }
    document.documentElement.setAttribute("data-theme", t);
  }catch(e){} })();
</script>
<!-- 3台同期用：Supabase クライアント（鍵が未設定なら何もしない） -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f5f3ee; --card:#ffffff; --ink:#2b2722; --sub:#8a8276;
    --accent:#7a6a4f; --line:#e7e2d8; --good:#3c7a5a; --warn:#b6553f;
    --chipbg:#fcfbf9; --headerbg:rgba(245,243,238,.92);
  }
  :root[data-theme="dark"]{
    --bg:#1b1916; --card:#262320; --ink:#ece7dd; --sub:#9c9486;
    --accent:#bb9d63; --line:#3a352e; --good:#6bb892; --warn:#d98a6e;
    --chipbg:#2f2b26; --headerbg:rgba(27,25,22,.92);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.8;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    transition:background .2s ease, color .2s ease;
  }
  header{
    padding:16px 18px 12px; position:sticky; top:0; z-index:5;
    background:var(--headerbg); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .htop{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  h1{font-size:18px; margin:0; letter-spacing:.04em;}
  #themeBtn{
    flex:0 0 auto; width:auto; background:transparent; border:1px solid var(--line);
    color:var(--ink); font-size:18px; padding:6px 10px; border-radius:10px; line-height:1;
  }
  .hint{font-size:12px; color:var(--sub); margin-top:2px;}
  main{max-width:720px; margin:0 auto; padding:14px 14px 80px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:14px;}
  textarea{
    width:100%; min-height:120px; border:1px solid var(--line); border-radius:10px;
    padding:12px; font-size:16px; font-family:inherit; resize:vertical; background:var(--chipbg); color:var(--ink);
  }
  .label-sm{font-size:12px; color:var(--sub); margin:14px 0 8px;}
  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{
    font-size:13px; font-weight:600; padding:8px 12px; border-radius:999px;
    border:1px solid var(--line); background:var(--chipbg); color:var(--sub); cursor:pointer;
  }
  .chip.on{background:var(--accent); color:#fff; border-color:var(--accent);}
  .row{display:flex; gap:10px; align-items:center; margin-top:14px;}
  button{
    appearance:none; border:none; border-radius:10px; padding:13px 16px; font-size:15px;
    font-weight:600; color:#fff; background:var(--accent); flex:1; cursor:pointer;
  }
  button:disabled{opacity:.5;}
  .genre-tag{display:inline-block; font-size:12px; font-weight:700; color:#fff; background:var(--accent); padding:3px 10px; border-radius:999px; letter-spacing:.04em;}
  .out h2{font-size:19px; margin:12px 0 8px; line-height:1.5;}
  .out .insight{font-size:16px;}
  .out .meta{margin-top:14px; padding-top:12px; border-top:1px dashed var(--line); font-size:13px; color:var(--sub);}
  .out .meta .glabel{color:var(--accent); font-weight:700; margin-right:4px;}
  .out .apply{margin-top:8px; font-size:14.5px;}
  .when{font-size:11px; color:var(--sub); margin-top:10px;}
  .loading{font-size:14px; color:var(--sub); padding:8px 0;}
  .spin{display:inline-block; width:14px; height:14px; border:2px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; vertical-align:-2px; margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  details.setup{margin-bottom:14px;}
  details.setup summary{font-size:13px; color:var(--sub); cursor:pointer; padding:6px 0;}
  input[type=password],input[type=text],input[type=email]{width:100%; border:1px solid var(--line); border-radius:10px; padding:11px; font-size:15px; margin-top:8px; background:var(--chipbg); color:var(--ink);}
  button.secondary{background:var(--chipbg); color:var(--ink); border:1px solid var(--line);}
  #search{margin-top:0; font-size:16px;}
  .tagcloud{display:flex; flex-wrap:wrap; gap:7px; margin-top:12px;}
  .tag{font-size:12.5px; font-weight:600; padding:5px 11px; border-radius:999px; border:1px solid var(--line); background:var(--chipbg); color:var(--accent); cursor:pointer;}
  .tag.on{background:var(--accent); color:#fff; border-color:var(--accent);}
  .out .tags{display:flex; flex-wrap:wrap; gap:7px; margin-top:12px;}
  .out .tags .tag{font-size:12px;}
  .filterinfo{font-size:12.5px; color:var(--sub); margin-top:12px; display:none; align-items:center; gap:10px;}
  .filterinfo button{flex:0 0 auto; width:auto; background:var(--chipbg); color:var(--ink); border:1px solid var(--line); padding:5px 12px; font-size:12.5px;}
  .noresult{text-align:center; color:var(--sub); font-size:13px; padding:18px 0;}
  .modebar{display:flex; gap:8px; margin-bottom:14px;}
  .modebtn{flex:1; background:var(--chipbg); color:var(--sub); border:1px solid var(--line); font-weight:600; font-size:14px; padding:11px;}
  .modebtn.on{background:var(--accent); color:#fff; border-color:var(--accent);}
  .nextinfo{font-size:12.5px; color:var(--sub); text-align:center; margin-top:10px;}
  .mentor .q{font-size:14px; color:var(--accent); font-weight:700; border-left:3px solid var(--accent); padding-left:10px; margin-bottom:12px; white-space:pre-wrap; line-height:1.6;}
  .mentor .a{font-size:15.5px;}
  #toast{
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px);
    background:var(--accent); color:#fff; padding:11px 18px; border-radius:999px; font-size:13.5px; font-weight:600;
    box-shadow:0 6px 20px rgba(0,0,0,.18); opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:20; max-width:90vw; text-align:center;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .small{font-size:12px; color:var(--sub);}
  .count{font-size:12px; color:var(--sub); text-align:center; margin:6px 0 0;}
  .err{color:var(--warn); font-size:13px; margin-top:8px;}
  .sectiontitle{font-size:12px; color:var(--sub); letter-spacing:.08em; margin:22px 4px 6px;}
  .src-item{font-size:13px; color:var(--sub); padding:8px 0; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .src-item .stext{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .src-item .sg{flex:0 0 auto; font-size:11px; color:var(--accent); font-weight:700;}
  .del{color:var(--warn); background:none; border:none; font-size:12px; padding:2px 6px; flex:0; width:auto; font-weight:600; cursor:pointer;}
</style>
</head>
<body>
<header>
  <div class="htop">
    <h1>教養ログ</h1>
    <button id="themeBtn" title="表示モード切り替え">🌙</button>
  </div>
  <div class="hint">文字起こしを貼り、ジャンルを選んで保存 → そのジャンルの中から教訓が出ます</div>
</header>

<div id="toast"></div>

<main>
  <details class="setup" id="setup">
    <summary>⚙️ Gemini APIキーの設定</summary>
    <div class="card">
      <div class="small">この端末にだけ保存されます（コードやネットには載りません）。<br>キーは Google AI Studio で無料取得できます。</div>
      <input type="password" id="apiKey" placeholder="AIza... を貼り付け" autocomplete="off">
      <div class="row">
        <button id="saveKey">キーを保存</button>
      </div>
      <div class="small" id="keyState"></div>
    </div>
  </details>

  <div class="card" id="syncCard" style="display:none">
    <div class="small" id="syncState"></div>
    <div id="loginForm">
      <input type="email" id="email" placeholder="メールアドレス" autocomplete="username">
      <input type="password" id="password" placeholder="パスワード（6文字以上）" autocomplete="current-password">
      <div class="row">
        <button id="loginBtn">ログイン</button>
        <button id="signupBtn" class="secondary">新規登録</button>
      </div>
    </div>
    <div id="loggedIn" style="display:none">
      <div class="row"><button id="logoutBtn" class="secondary">ログアウト</button></div>
    </div>
    <div class="small err" id="syncError" style="display:none"></div>
  </div>

  <div class="modebar">
    <button class="modebtn on" data-mode="log" id="modeLog">📥 ためる・教訓</button>
    <button class="modebtn" data-mode="mentor" id="modeMentor">💬 相談</button>
  </div>

  <div id="viewLog">
    <div class="card">
      <textarea id="input" placeholder="ここに文字起こしを貼り付け"></textarea>
      <div class="label-sm">このメモを入れるジャンル（タブ）</div>
      <div class="chips" id="chips"></div>
      <div class="row">
        <button id="save">保存して教訓を出す</button>
      </div>
      <div class="nextinfo" id="nextInfo"></div>
    </div>

    <div class="card" id="searchArea" style="display:none">
      <input type="text" id="search" placeholder="🔍 教訓を検索（言葉・タグ）">
      <div class="tagcloud" id="tagcloud"></div>
      <div class="filterinfo" id="filterInfo"></div>
    </div>

    <div id="result"></div>

    <div class="count" id="count"></div>

    <div class="sectiontitle" id="srcTitle" style="display:none">溜め込み（タップで削除可）</div>
    <div id="sources"></div>
  </div>

  <div id="viewMentor" style="display:none">
    <div class="card">
      <div class="label-sm" style="margin-top:0">これまで溜めた記録をふまえて、メンターが相談に答えます</div>
      <textarea id="mentorInput" placeholder="今の悩み・迷っていること・考えたいことを書いてください"></textarea>
      <div class="row">
        <button id="mentorBtn">相談する</button>
      </div>
      <div class="small" id="mentorNote"></div>
    </div>
    <div id="mentorResult"></div>
  </div>
</main>

<script>
const GENRES = ["人間・世間","知識・教養","地理・歴史","ビジネス・企業","AI・Tech"];
const LS = {
  key:"kyoyo_apikey", entries:"kyoyo_entries", outputs:"kyoyo_outputs", sel:"kyoyo_sel",
  theme:"kyoyo_theme", count:"kyoyo_savecount", mentor:"kyoyo_mentor", mode:"kyoyo_mode"
};
const $ = id => document.getElementById(id);
const load = (k,def) => { try{return JSON.parse(localStorage.getItem(k)) ?? def;}catch(e){return def;} };
const save = (k,v) => localStorage.setItem(k, JSON.stringify(v));
const sleep = ms => new Promise(r=>setTimeout(r, ms));

let entries = load(LS.entries, []);   // {id, text, genre, createdAt}
let outputs = load(LS.outputs, []);   // {id, genre, title, insight, basis, apply, createdAt}
let selected = load(LS.sel, GENRES[0]);
let saveCount = load(LS.count, 0);
let query = "";
let mentorHistory = load(LS.mentor, []);   // {id, q, a, createdAt}
let mode = load(LS.mode, "log");
const CYCLE = 4;   // 何回の保存につき1回 教訓を出すか

/* ===== 3台同期（Supabase）=====
   下の2つに Sou_Diary プロジェクトの値を入れると同期が有効になる。
   未設定（PUT_…のまま）なら、これまで通りローカルだけで動く。 */
const SUPABASE_URL = "https://icxbyltorjpfexmwxzga.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_6qgfCo_xbhbjb3Lr__j-Yg_Y7Zk2yWH";  // publishable（公開して安全な鍵）
const syncEnabled = /^https:\/\/.+\.supabase\.co/.test(SUPABASE_URL) && !SUPABASE_ANON_KEY.startsWith("PUT_");
let sb = null;
if(syncEnabled && window.supabase){ sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }

// 旧データ（ジャンル無し）を移行
let migrated=false;
entries.forEach(e=>{ if(!e.genre){ e.genre = GENRES[0]; migrated=true; } });
if(migrated) save(LS.entries, entries);

function fmt(ts){ const d=new Date(ts); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function escapeHtml(s){ return String(s).replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m])); }

// テーマ
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  $("themeBtn").textContent = (t==="dark") ? "☀️" : "🌙";
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute("data-theme")==="dark" ? "dark" : "light";
  const next = cur==="dark" ? "light" : "dark";
  save(LS.theme, next); applyTheme(next);
}

// 軽いお知らせ
let toastTimer=null;
function toast(msg){
  const el=$("toast"); el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove("show"), 2600);
}

function refreshKeyUI(){
  const k = localStorage.getItem(LS.key);
  if(k){ $("keyState").textContent = "✅ キー保存済み"; $("setup").open=false; }
  else { $("keyState").textContent = "未設定（保存するまで動きません）"; $("setup").open=true; }
}

function renderChips(){
  const wrap = $("chips"); wrap.innerHTML="";
  GENRES.forEach(g=>{
    const n = entries.filter(e=>e.genre===g).length;
    const c = document.createElement("div");
    c.className = "chip" + (g===selected ? " on":"");
    c.textContent = n ? `${g}（${n}）` : g;
    c.onclick = ()=>{ selected=g; save(LS.sel,selected); renderChips(); };
    wrap.appendChild(c);
  });
}

function refreshCount(){ $("count").textContent = entries.length ? `溜め込み ${entries.length}本 / 出力 ${outputs.length}回` : "まだ何も溜まっていません"; }

function refreshSources(){
  const wrap = $("sources"); wrap.innerHTML="";
  $("srcTitle").style.display = entries.length ? "block" : "none";
  entries.slice().reverse().forEach(e=>{
    const div=document.createElement("div"); div.className="src-item";
    const g=document.createElement("span"); g.className="sg"; g.textContent=e.genre;
    const s=document.createElement("span"); s.className="stext"; s.textContent = e.text.slice(0,34).replace(/\n/g," ")+"…";
    const b=document.createElement("button"); b.className="del"; b.textContent="削除";
    b.onclick=()=>{ entries=entries.filter(x=>x.id!==e.id); save(LS.entries,entries); deleteItemRemote(e.id); refreshSources(); refreshCount(); renderChips(); };
    div.appendChild(g); div.appendChild(s); div.appendChild(b); wrap.appendChild(div);
  });
}

function setQuery(q){
  query = q;
  $("search").value = q;
  renderOutputs();
  window.scrollTo({top:0, behavior:"smooth"});
}

function matchesQuery(o){
  if(!query) return true;
  const q = query.toLowerCase();
  const hay = [o.title, o.insight, o.basis, o.genre, (o.tags||[]).join(" ")].join(" ").toLowerCase();
  return hay.includes(q);
}

function renderTagCloud(){
  const set = new Set();
  outputs.forEach(o => (o.tags||[]).forEach(t => set.add(t)));
  const cloud = $("tagcloud"); cloud.innerHTML = "";
  [...set].forEach(t=>{
    const el = document.createElement("span");
    el.className = "tag" + (query.toLowerCase()===t.toLowerCase() ? " on" : "");
    el.textContent = "#"+t;
    el.onclick = ()=> setQuery(query.toLowerCase()===t.toLowerCase() ? "" : t);
    cloud.appendChild(el);
  });
}

function renderOutputs(){
  $("searchArea").style.display = outputs.length ? "block" : "none";
  renderTagCloud();

  const info = $("filterInfo");
  const list = outputs.filter(matchesQuery).reverse();
  if(query){
    info.style.display = "flex";
    info.innerHTML = `「${escapeHtml(query)}」で絞り込み中：${list.length}件 <button id="clearFilter">クリア</button>`;
    $("clearFilter").onclick = ()=> setQuery("");
  } else {
    info.style.display = "none";
  }

  const r = $("result"); r.innerHTML = "";
  if(outputs.length && list.length===0){
    r.innerHTML = `<div class="noresult">該当する教訓がありません</div>`;
    return;
  }
  list.forEach(o=>{
    const c = document.createElement("div"); c.className = "card out";
    c.innerHTML = `
      <span class="genre-tag">${o.genre}</span>
      <h2>${escapeHtml(o.title||"")}</h2>
      <div class="insight">${escapeHtml(o.insight||"").replace(/\n/g,"<br>")}</div>
      <div class="meta"><span class="glabel">どこから</span>${escapeHtml(o.basis||"")}</div>
      <div class="tags"></div>
      <div class="when">${fmt(o.createdAt)}</div>`;
    const tagsEl = c.querySelector(".tags");
    if(o.tags && o.tags.length){
      o.tags.forEach(t=>{
        const s = document.createElement("span"); s.className = "tag"; s.textContent = "#"+t;
        s.onclick = ()=> setQuery(t);
        tagsEl.appendChild(s);
      });
    } else {
      tagsEl.style.display = "none";
    }
    r.appendChild(c);
  });
}

function buildPrompt(genre){
  const pool = entries.filter(e=>e.genre===genre);
  const corpus = pool.map((e,i)=>`【素材${i+1}（${fmt(e.createdAt)}）】\n${e.text}`).join("\n\n----\n\n");
  return `あなたは、むずかしい話をやさしく伝えるのが得意な、聞き上手な解説者です。
以下は、私が「${genre}」というテーマで集めた、Podcastや動画の文字起こしです。

このテーマの素材【全体】を読み、日々の指針になる「教訓」を1つ選んで伝えてください。

# いちばん大事なこと（読みやすさ最優先）
- 中学生でもスッと頭に入る、やさしい言葉で書く。むずかしい専門用語は避ける。どうしても使うなら一言で説明を添える。
- 一文を短く。漢語や言い回しを詰め込まない。声に出して読めるくらい自然に。
- 「結局どういうこと？」が一読で残るように。
- ただし内容は薄くしない。その素材ならではの具体的な気づきは必ず残す。たとえ話や身近な具体例でかみ砕く。
- ありきたりな一般論や、聞けば当たり前の話は避ける。

# 出力（必ずJSON。日本語）
{
 "genre": "${genre}",
 "title": "ひと言で言い切る教訓（やさしい言葉で20字前後）",
 "insight": "教訓の中身。やさしい言葉で4〜6文。たとえ話や身近な例を交えて、最後まで読むと腑に落ちるように。",
 "basis": "どの話から気づいたか（やさしく一言で）",
 "tags": ["この教訓を後で探しやすくする短いキーワードを2〜4個。日本語の単語。記号や#は付けない。例: 習慣, 意思決定, お金"]
}

# 素材（テーマ：${genre}）
${corpus}`;
}

function buildMentorPrompt(question){
  const corpus = entries.length
    ? entries.map((e,i)=>`【記録${i+1}・${e.genre}（${fmt(e.createdAt)}）】\n${e.text}`).join("\n\n----\n\n")
    : "（まだ記録がありません）";
  return `あなたは、私のことをよく知る、聡明で温かいメンターです。
以下は、私がこれまで集めてきたPodcastや動画の文字起こし（学びの記録）です。私が大切だと思って溜めてきた、価値観や関心の蓄積です。

# 私の相談
「${question}」

# 答え方のお願い
- 上の【私の蓄積】をふまえ、私の関心や価値観に寄り添って答えてください。
- できれば蓄積の中の具体的な話に触れ、「前にあなたが残したこの話のように」と結びつけてください（記録が無ければ一般論でも構いません）。
- 説教くさくならず、やさしい言葉で。短い段落で、声に出して読めるくらい自然に。
- 一般論で終わらせず、私の状況に踏み込んだ具体的な視点や助言を。
- 最後に、そっと背中を押すひと言を添えてください。
- 出力はそのままの文章で（JSONや箇条書きの記号は不要）。

# 私の蓄積
${corpus}`;
}

const MAX_TRY = 5;
// Gemini 呼び出しの共通処理（jsonMode=true なら JSON を返し、false なら文章を返す）
async function geminiCall(prompt, jsonMode, onStatus, attempt=0){
  const key = localStorage.getItem(LS.key);
  if(!key){ throw new Error("APIキーが未設定です"); }
  const retry = async (msg) => { if(onStatus) onStatus(`${msg} (${attempt+1}/${MAX_TRY})`); await sleep(1500*(attempt+1)); return geminiCall(prompt,jsonMode,onStatus,attempt+1); };
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
  const body = {
    contents:[{parts:[{text: prompt}]}],
    generationConfig: jsonMode ? { responseMimeType:"application/json", temperature:0.8 } : { temperature:0.85 }
  };

  // --- 通信 ---
  let res;
  try{
    res = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  }catch(e){
    if(attempt < MAX_TRY) return retry("接続待ち…再試行");
    throw new Error("通信できませんでした。電波の良い場所でもう一度お試しください");
  }

  // --- キーの問題は再試行しない ---
  if(res.status===400 || res.status===401 || res.status===403){
    throw new Error("APIキーが正しくないようです。⚙️設定を見直してください");
  }
  // --- 混雑・一時障害は自動リトライ ---
  if((res.status===429 || res.status>=500) && attempt < MAX_TRY){
    return retry("Geminiが混雑中…自動で再試行");
  }
  if(!res.ok){
    if(attempt < MAX_TRY) return retry("エラー、再試行");
    throw new Error("エラーが続いています（"+res.status+"）。少し時間をおいて再試行してください");
  }

  // --- 応答の読み取り ---
  let data;
  try{ data = await res.json(); }
  catch(e){ if(attempt < MAX_TRY) return retry("応答待ち…再試行"); throw new Error("応答を読み取れませんでした。もう一度お試しください"); }

  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!text){
    if(attempt < MAX_TRY) return retry("生成し直し中");
    throw new Error("うまく生成できませんでした。もう一度お試しください");
  }

  if(!jsonMode) return text.trim();

  // --- JSON の形が崩れていたら作り直し ---
  try{ return JSON.parse(text); }
  catch(e){
    if(attempt < MAX_TRY) return retry("整え直し中");
    throw new Error("出力の形が崩れました。もう一度お試しください");
  }
}

const callGemini = (genre, onStatus) => geminiCall(buildPrompt(genre), true, onStatus);
const callMentor = (question, onStatus) => geminiCall(buildMentorPrompt(question), false, onStatus);

async function generateFor(genre, card){
  $("save").disabled = true;
  const setStatus = msg => card.innerHTML = `<div class="loading"><span class="spin"></span>${escapeHtml(msg)}</div>`;
  setStatus(`「${genre}」の中から教訓を考えています…`);
  try{
    const o = await callGemini(genre, setStatus);
    o.id = Date.now()+"_"+Math.random().toString(36).slice(2,7); o.createdAt = Date.now(); o.genre = genre;
    outputs.push(o); save(LS.outputs, outputs); pushItem("output", o);
    card.remove();
    renderOutputs();
    refreshCount();
  }catch(err){
    card.innerHTML = `<div class="err">⚠️ ${escapeHtml(err.message)}</div>`;
    const b = document.createElement("button");
    b.textContent = "もう一度ためす"; b.style.marginTop = "10px";
    b.onclick = () => generateFor(genre, card);
    card.appendChild(b);
  }finally{
    $("save").disabled = false;
  }
}

async function onSave(){
  const txt = $("input").value.trim();
  if(!txt){ return; }
  if(!localStorage.getItem(LS.key)){ $("setup").open=true; alert("先にGemini APIキーを設定してください"); return; }

  const genre = selected;
  // 1) 選んだジャンルのタブに追加
  const entry = {id:Date.now()+"_"+Math.random().toString(36).slice(2,7), text:txt, genre, createdAt:Date.now()};
  entries.push(entry); save(LS.entries, entries); pushItem("entry", entry);
  $("input").value=""; renderChips(); refreshSources(); refreshCount();

  // 2) CYCLE回の保存につき1回だけ教訓を生成する
  saveCount = saveCount + 1; save(LS.count, saveCount);
  refreshNextInfo();
  if(saveCount % CYCLE !== 0){
    const rem = CYCLE - (saveCount % CYCLE);
    toast(`保存しました（あと${rem}回で教訓が出ます）`);
    return;
  }

  // 生成回：そのタブに溜まった内容全体から教訓を生成
  const card = document.createElement("div");
  card.className = "card";
  $("result").prepend(card);
  await generateFor(genre, card);
}

function refreshNextInfo(){
  const rem = CYCLE - (saveCount % CYCLE);
  $("nextInfo").textContent = (rem===1) ? "次の保存で教訓が出ます" : `あと ${rem} 回の保存で教訓が出ます`;
}

// メンター（相談）
function renderMentor(){
  $("mentorNote").textContent = entries.length
    ? `これまでの記録 ${entries.length}件 をふまえて答えます`
    : "まだ記録がありません（一般的な助言になります）";
  const r = $("mentorResult"); r.innerHTML = "";
  mentorHistory.slice().reverse().forEach(m=>{
    const c = document.createElement("div"); c.className = "card mentor";
    c.innerHTML = `
      <div class="q">${escapeHtml(m.q)}</div>
      <div class="a">${escapeHtml(m.a||"").replace(/\n/g,"<br>")}</div>
      <div class="when">${fmt(m.createdAt)}</div>`;
    r.appendChild(c);
  });
}

async function onMentor(){
  const q = $("mentorInput").value.trim();
  if(!q){ return; }
  if(!localStorage.getItem(LS.key)){ $("setup").open=true; alert("先にGemini APIキーを設定してください"); return; }

  const btn = $("mentorBtn"); btn.disabled = true;
  const card = document.createElement("div"); card.className = "card";
  $("mentorResult").prepend(card);
  const setStatus = msg => card.innerHTML = `<div class="loading"><span class="spin"></span>${escapeHtml(msg)}</div>`;
  setStatus("これまでの記録をふまえて考えています…");
  try{
    const a = await callMentor(q, setStatus);
    const m = {id:Date.now()+"_"+Math.random().toString(36).slice(2,7), q, a, createdAt:Date.now()};
    mentorHistory.push(m); save(LS.mentor, mentorHistory); pushItem("mentor", m);
    $("mentorInput").value = "";
    card.remove();
    renderMentor();
  }catch(err){
    card.innerHTML = `<div class="err">⚠️ ${escapeHtml(err.message)}</div>`;
    const b = document.createElement("button");
    b.textContent = "もう一度ためす"; b.style.marginTop = "10px";
    b.onclick = () => { card.remove(); $("mentorInput").value = q; onMentor(); };
    card.appendChild(b);
  }finally{
    btn.disabled = false;
  }
}

function setMode(m){
  mode = m; save(LS.mode, m);
  $("viewLog").style.display = (m==="log") ? "block" : "none";
  $("viewMentor").style.display = (m==="mentor") ? "block" : "none";
  $("modeLog").classList.toggle("on", m==="log");
  $("modeMentor").classList.toggle("on", m==="mentor");
  if(m==="mentor") renderMentor();
}

/* ===== 同期（Supabase）処理 ===== */
function showSyncError(m){ const e=$("syncError"); if(m){ e.style.display="block"; e.textContent=m; } else { e.style.display="none"; e.textContent=""; } }

async function getSession(){ if(!sb) return null; const { data } = await sb.auth.getSession(); return data.session; }

async function refreshSyncUI(){
  if(!sb){ $("syncCard").style.display="none"; return; }
  $("syncCard").style.display="block";
  const session = await getSession();
  if(session){
    $("loginForm").style.display="none";
    $("loggedIn").style.display="block";
    $("syncState").textContent = "✅ 同期中：" + session.user.email;
  } else {
    $("loginForm").style.display="block";
    $("loggedIn").style.display="none";
    $("syncState").textContent = "ログインすると、PC・スマホ2台で記録を共有できます";
  }
}

async function pushItem(kind, obj){
  if(!sb) return;
  if(!(await getSession())) return;
  try{
    await sb.from("kyoyo_items").upsert({
      id: obj.id, kind, data: obj,
      created_at: new Date(obj.createdAt || Date.now()).toISOString(),
      updated_at: new Date().toISOString(),
      deleted: false
    });
  }catch(e){ /* オフライン等は次回のpullで吸収 */ }
}
async function deleteItemRemote(id){
  if(!sb) return;
  if(!(await getSession())) return;
  try{ await sb.from("kyoyo_items").update({ deleted:true, updated_at:new Date().toISOString() }).eq("id", id); }catch(e){}
}

async function pullAndMerge(){
  if(!sb) return;
  if(!(await getSession())) return;
  const { data: rows, error } = await sb.from("kyoyo_items").select("*");
  if(error){ showSyncError("同期の取得に失敗：" + error.message); return; }

  const tomb = new Set(rows.filter(r=>r.deleted).map(r=>r.id));
  const active = rows.filter(r=>!r.deleted);

  function mergeKind(kind, localArr){
    const remoteById = new Map();
    active.filter(r=>r.kind===kind).forEach(r=> remoteById.set(r.id, r.data));
    const merged = new Map();
    remoteById.forEach((v,k)=> merged.set(k, v));         // クラウドを採用
    const toPush = [];
    localArr.forEach(o=>{
      if(tomb.has(o.id)) return;                          // 他端末で削除済み → 捨てる
      if(!remoteById.has(o.id)){ merged.set(o.id, o); toPush.push(o); }  // 未アップロードのローカル分
    });
    const list = [...merged.values()].sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    return { list, toPush };
  }

  const e = mergeKind("entry", entries);
  const o = mergeKind("output", outputs);
  const m = mergeKind("mentor", mentorHistory);

  entries = e.list; outputs = o.list; mentorHistory = m.list;
  save(LS.entries, entries); save(LS.outputs, outputs); save(LS.mentor, mentorHistory);

  for(const x of e.toPush) await pushItem("entry", x);    // ローカル専用だった分をクラウドへ
  for(const x of o.toPush) await pushItem("output", x);
  for(const x of m.toPush) await pushItem("mentor", x);

  renderChips(); refreshSources(); refreshCount(); renderOutputs(); renderMentor();
}

async function doLogin(){
  const email=$("email").value.trim(), password=$("password").value;
  if(!email || !password){ return; }
  showSyncError(""); $("loginBtn").disabled=true; $("signupBtn").disabled=true;
  try{
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if(error){ showSyncError("ログインできません：" + error.message); return; }
    $("password").value="";
    await refreshSyncUI(); await pullAndMerge();
  }finally{ $("loginBtn").disabled=false; $("signupBtn").disabled=false; }
}
async function doSignup(){
  const email=$("email").value.trim(), password=$("password").value;
  if(!email || !password){ return; }
  showSyncError(""); $("loginBtn").disabled=true; $("signupBtn").disabled=true;
  try{
    const { error } = await sb.auth.signUp({ email, password });
    if(error){ showSyncError("登録できません：" + error.message); return; }
    const session = await getSession();
    if(!session){ showSyncError("登録しました。メール確認が必要な設定の場合は、確認後にログインしてください。"); await refreshSyncUI(); return; }
    $("password").value="";
    await refreshSyncUI(); await pullAndMerge();
  }finally{ $("loginBtn").disabled=false; $("signupBtn").disabled=false; }
}
async function doLogout(){ if(sb){ await sb.auth.signOut(); } await refreshSyncUI(); }

$("saveKey").onclick=()=>{
  const v=$("apiKey").value.trim();
  if(!v){ return; }
  localStorage.setItem(LS.key, v); $("apiKey").value="";
  refreshKeyUI();
};
$("save").onclick=onSave;
$("themeBtn").onclick=toggleTheme;
$("search").oninput = (e)=>{ query = e.target.value.trim(); renderOutputs(); };
$("mentorBtn").onclick=onMentor;
$("modeLog").onclick=()=>setMode("log");
$("modeMentor").onclick=()=>setMode("mentor");
$("loginBtn").onclick=doLogin;
$("signupBtn").onclick=doSignup;
$("logoutBtn").onclick=doLogout;

// 初期描画
applyTheme(document.documentElement.getAttribute("data-theme")==="dark" ? "dark" : "light");
refreshKeyUI(); renderChips(); refreshCount(); refreshSources(); renderOutputs(); refreshNextInfo();
setMode(mode);

// 同期：ログイン済みなら起動時にクラウドと突き合わせ
refreshSyncUI().then(()=> pullAndMerge());
</script>
